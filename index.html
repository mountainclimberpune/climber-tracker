<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT MOUNTAIN CLIMBER TRACKER</title>
    <style>
        :root { --neon-blue: #00f2ff; --neon-red: #ff004c; --dark-bg: #0a0b10; }
        body { background-color: var(--dark-bg); color: white; font-family: 'Courier New', monospace; margin: 0; padding: 20px; text-align: center; }
        
        .emergency-active { background-color: #7b0000 !important; animation: bg-blink 0.5s infinite; }
        @keyframes bg-blink { 0% { background-color: #7b0000; } 50% { background-color: #ff0000; } 100% { background-color: #7b0000; } }

        .card { background: rgba(16, 18, 27, 0.9); border: 1px solid rgba(0, 242, 255, 0.2); padding: 20px; margin: 10px; display: inline-block; width: 250px; }
        .value { font-size: 3em; font-weight: bold; }
        #status-panel { padding: 15px; border: 1px solid var(--neon-blue); margin-bottom: 20px; font-weight: bold; }
        
        /* Overlay */
        #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        button { padding: 20px 50px; font-size: 20px; background: var(--neon-blue); border: none; cursor: pointer; font-weight: bold; margin: 10px; }
        #test-btn { background: #444; color: white; font-size: 14px; padding: 10px; }
    </style>
</head>
<body>

    <div id="start-overlay">
        <h2 style="color:var(--neon-blue)">SYSTEM READY</h2>
        <button onclick="initHUD()">ACTIVATE MISSION CONTROL</button>
        <p style="font-size: 12px; opacity: 0.6;">Click to enable Live Data & Emergency Audio</p>
    </div>

    <h1>IoT based Mountain climber health & Position Tracking</h1>
    <div id="status-panel">AWAITING CONNECTION...</div>
    
    <button id="test-btn" onclick="playEmergencyBeep()">TEST ALARM SOUND</button>

    <div class="dashboard-grid">
        <div class="card"><div>HEART RATE</div><div class="value" id="bpm">--</div></div>
        <div class="card"><div>FORCE</div><div class="value" id="force">--</div></div>
        <div class="card">
            <div>GPS</div>
            <div id="coords" style="font-size: 0.8em; margin: 10px 0;">NO FIX</div>
            <a id="mapLink" href="#" target="_blank" style="color:var(--neon-blue)">[ GOOGLE MAPS ]</a>
        </div>
    </div>

    <script>
        const channelID = "3321243";
        let audioCtx = null;
        let alarmInterval = null;
        let isEmergency = false;

        // 1. Initialize the Audio Context on first click
        function initHUD() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById('start-overlay').style.display = 'none';
            document.getElementById('status-panel').innerText = "SYSTEM ONLINE // MONITORING";
            fetchData();
            setInterval(fetchData, 15000);
        }

        // 2. Function to generate a raw electronic beep
        function playEmergencyBeep() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = "square"; // Futuristic "beep" sound
            osc.frequency.setValueAtTime(880, audioCtx.currentTime); // High pitch
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.2); // Beep duration 0.2s
        }

        function fetchData() {
            fetch(`https://api.thingspeak.com/channels/${channelID}/feeds.json?results=1`)
            .then(res => res.json())
            .then(data => {
                const last = data.feeds[0];
                document.getElementById('bpm').innerText = last.field1 || "0";
                document.getElementById('force').innerText = last.field2 || "10";
                
                if(last.field3 && last.field4) {
                    document.getElementById('coords').innerText = last.field3 + ", " + last.field4;
                    document.getElementById('mapLink').href = `https://www.google.com/maps?q=${last.field3},${last.field4}`;
                }

                if(last.field5 == "1" && !isEmergency) {
                    triggerEmergency();
                }
            });
        }

        function triggerEmergency() {
            isEmergency = true;
            document.body.classList.add('emergency-active');
            document.getElementById('status-panel').innerText = "!!! FALL DETECTED !!!";
            
            // Repeat the beep every 0.5 seconds
            alarmInterval = setInterval(playEmergencyBeep, 500);

            setTimeout(() => {
                clearInterval(alarmInterval);
                isEmergency = false;
                document.body.classList.remove('emergency-active');
                document.getElementById('status-panel').innerText = "SYSTEM ONLINE // MONITORING";
            }, 30000); // 30 second alert
        }
    </script>
</body>
</html>
