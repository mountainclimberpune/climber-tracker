<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLIMBER_OS // Tactical Telemetry</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap');

        :root {
            --neon-blue: #00f2ff;
            --neon-green: #39ff14;
            --neon-red: #ff004c;
            --panel-bg: rgba(18, 20, 28, 0.95);
            --dark-bg: #0a0b0e;
        }

        body {
            background-color: var(--dark-bg);
            background-image: linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            color: white;
            font-family: 'Rajdhani', sans-serif;
            margin: 0; padding: 20px;
            transition: all 0.3s ease;
        }

        /* EMERGENCY STATE - FLASHING RED GRID */
        .emergency-active {
            background-color: #400 !important;
            animation: panic-flash 0.5s infinite;
        }
        @keyframes panic-flash {
            0% { background-color: #200; }
            50% { background-color: #700; }
            100% { background-color: #200; }
        }

        .container { max-width: 1000px; margin: 0 auto; }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 0; border-bottom: 2px solid rgba(255,255,255,0.1);
            margin-bottom: 40px;
        }

        h1 { font-family: 'Orbitron', sans-serif; font-size: 1.4rem; color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); margin: 0; }

        #status-box {
            font-family: 'Orbitron', sans-serif; font-size: 0.8rem;
            padding: 8px 20px; border: 1px solid var(--neon-green);
            color: var(--neon-green); clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
        }

        .alert-box { border-color: var(--neon-red) !important; color: white !important; background: var(--neon-red); animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.4; } }

        /* DASHBOARD CARDS */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }

        .card {
            background: var(--panel-bg);
            border-left: 4px solid var(--neon-blue);
            padding: 30px;
            position: relative;
            clip-path: polygon(0 0, 100% 0, 100% calc(100% - 25px), calc(100% - 25px) 100%, 0 100%);
            box-shadow: 10px 10px 20px rgba(0,0,0,0.5);
        }

        .card-label { font-family: 'Orbitron', sans-serif; font-size: 0.75rem; color: rgba(255,255,255,0.5); letter-spacing: 2px; margin-bottom: 15px; }

        .stat-value { font-family: 'Orbitron', sans-serif; font-size: 4rem; font-weight: bold; line-height: 1; }
        #bpm-val { color: var(--neon-green); }
        #force-val { color: white; }

        .unit { font-size: 1rem; color: rgba(255,255,255,0.3); font-family: 'Rajdhani'; margin-left: 5px; }

        /* GPS STYLING */
        #gps-card { grid-column: span 1; }
        .coords { font-size: 1.5rem; color: var(--neon-blue); margin: 15px 0; }
        #map-link {
            text-decoration: none; color: black; background: var(--neon-blue);
            padding: 10px 25px; display: inline-block; font-weight: bold;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            transition: 0.3s;
        }
        #map-link:hover { filter: brightness(1.2); box-shadow: 0 0 15px var(--neon-blue); }

        /* START OVERLAY */
        #overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: black; z-index: 9999; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
        }
        #start-btn {
            background: none; border: 2px solid var(--neon-blue); color: var(--neon-blue);
            padding: 20px 50px; font-family: 'Orbitron', sans-serif; font-size: 1.2rem;
            cursor: pointer; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
        }
        #start-btn:hover { background: var(--neon-blue); color: black; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 style="margin-bottom: 30px;">NEURO_LINK STANDBY</h1>
        <button id="start-btn" onclick="startHUD()">ACTIVATE MISSION CONTROL</button>
    </div>

    <div class="container">
        <header>
            <h1>CLIMBER.TELEMETRY_v1</h1>
            <div id="status-box">SYSTEM_STABLE</div>
        </header>

        <div class="grid">
            <div class="card">
                <div class="card-label">BIOMETRIC: HEART_RATE</div>
                <div class="stat-value" id="bpm-val">--<span class="unit">BPM</span></div>
            </div>

            <div class="card">
                <div class="card-label">PHYSICAL: IMPACT_FORCE</div>
                <div class="stat-value" id="force-val">--<span class="unit">N</span></div>
            </div>

            <div class="card" id="gps-card">
                <div class="card-label">GEOLOCATION: COORDINATES</div>
                <div class="coords" id="pos">LAT: -- / LON: --</div>
                <a id="map-link" href="#" target="_blank">OPEN SATELLITE FEED</a>
            </div>
        </div>
    </div>

    <script>
        const channelID = "3321243";
        let audioCtx = null;
        let alarmTicker = null;
        let isEmergency = false;

        function startHUD() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('status-box').innerText = "MONITORING_ACTIVE";
            
            updateHUD();
            setInterval(updateHUD, 15000);
        }

        // The "Old Test Sound" logic - High Frequency Beep
        function playAlertBeep() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = "square"; // Makes it sound electronic/harsh
            osc.frequency.setValueAtTime(880, audioCtx.currentTime); // 880Hz is a classic high beep
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.25); // Short sharp beep
        }

        function updateHUD() {
            fetch(`https://api.thingspeak.com/channels/${channelID}/feeds.json?results=1`)
            .then(res => res.json())
            .then(data => {
                const feed = data.feeds[0];
                document.getElementById('bpm-val').innerHTML = (feed.field1 || "0") + '<span class="unit">BPM</span>';
                document.getElementById('force-val').innerHTML = (feed.field2 || "10") + '<span class="unit">N</span>';
                
                if(feed.field3 && feed.field4) {
                    document.getElementById('pos').innerText = `LAT: ${feed.field3} / LON: ${feed.field4}`;
                    document.getElementById('map-link').href = `https://www.google.com/maps?q=${feed.field3},${feed.field4}`;
                }

                // Check for Fall (Field 5)
                if (feed.field5 == "1") {
                    triggerEmergency();
                } else {
                    stopEmergency();
                }
            });
        }

        function triggerEmergency() {
            if (isEmergency) return;
            isEmergency = true;
            document.body.classList.add('emergency-active');
            document.getElementById('status-box').innerText = "CRITICAL_FALL_ALERT";
            document.getElementById('status-box').classList.add('alert-box');
            
            // Start the Repeating Beep
            alarmTicker = setInterval(playAlertBeep, 600);
        }

        function stopEmergency() {
            if (!isEmergency) return;
            isEmergency = false;
            document.body.classList.remove('emergency-active');
            document.getElementById('status-box').innerText = "MONITORING_ACTIVE";
            document.getElementById('status-box').classList.remove('alert-box');
            clearInterval(alarmTicker);
        }
    </script>
</body>
</html>
