<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLIMBER_OS // v1.0</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');
        :root { --blue: #00f2ff; --red: #ff004c; --orange: #ff8800; --bg: #0a0b0e; }
        body { background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; margin: 0; padding: 20px; transition: 0.4s; }
        .panic-red { background: #500 !important; animation: f-red 0.5s infinite; }
        .panic-orange { background: #530 !important; animation: f-orange 0.5s infinite; }
        @keyframes f-red { 50% { background: #800; } }
        @keyframes f-orange { 50% { background: #860; } }
        .card { background: rgba(20,22,30,0.9); border-left: 4px solid var(--blue); padding: 25px; margin: 15px 0; clip-path: polygon(0 0, 100% 0, 100% 80%, 95% 100%, 0 100%); }
        .val { font-family: 'Orbitron'; font-size: 3.5rem; color: var(--blue); }
        #status-bar { border: 1px solid var(--blue); padding: 10px; text-align: center; font-family: 'Orbitron'; margin-bottom: 20px; }
        #overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:99; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        button { background: none; border: 2px solid var(--blue); color: var(--blue); padding: 15px 40px; font-family: 'Orbitron'; cursor: pointer; }
    </style>
</head>
<body>
    <div id="overlay"><button onclick="start()">ACTIVATE</button></div>
    <div id="status-bar">MONITORING_ACTIVE</div>
    <div class="card"><div>HEART_RATE / SpO2</div><div class="val" id="b">--</div><div id="o">O2: --%</div></div>
    <div class="card"><div>IMPACT_FORCE</div><div class="val" id="f">--</div></div>
    <div class="card"><div>COORDINATES</div><div id="p">LAT: -- / LON: --</div><br><a id="m" href="#" target="_blank" style="color:var(--blue)">[MAP FEED]</a></div>

    <script>
        const cid = "3321243";
        let aCtx = null, ticker = null, isAlert = false;
        function start() { aCtx = new AudioContext(); document.getElementById('overlay').style.display='none'; loop(); setInterval(loop, 15000); }
        function beep(freq, dur) { 
            let o = aCtx.createOscillator(), g = aCtx.createGain();
            o.type="square"; o.frequency.value=freq; g.gain.value=0.1;
            o.connect(g); g.connect(aCtx.destination); o.start(); o.stop(aCtx.currentTime+dur);
        }
        function loop() {
            fetch(`https://api.thingspeak.com/channels/${cid}/feeds.json?results=1`).then(r=>r.json()).then(d=>{
                const f = d.feeds[0];
                document.getElementById('b').innerText = f.field1;
                document.getElementById('f').innerText = f.field2;
                document.getElementById('o').innerText = "O2: " + (f.field6 || "--") + "%";
                if(f.field3) document.getElementById('p').innerText = f.field3 + " / " + f.field4;
                
                if(f.field5 == "1") trigger("FALL_DETECTED", "panic-red", 880, 0.6);
                else if(f.field5 == "2") trigger("HIGH_BPM_ALERT", "panic-orange", 1200, 0.3);
                else stop();
            });
        }
        function trigger(m, c, fr, sp) {
            document.body.className = c;
            document.getElementById('status-bar').innerText = m;
            clearInterval(ticker); ticker = setInterval(()=>beep(fr, 0.2), sp*1000);
        }
        function stop() { document.body.className=""; document.getElementById('status-bar').innerText="MONITORING_ACTIVE"; clearInterval(ticker); }
    </script>
</body>
</html>
